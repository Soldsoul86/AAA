# Release config for actually, one of five tools in the Soldsoul86/AAA monorepo.
# This is a subfolder module — goreleaser is invoked from *inside*
# actually/ by the root .github/workflows/release-actually.yml workflow
# (working-directory: actually), so all paths here are relative to this folder.
#
# Test locally before ever tagging a real release:
#   cd actually && goreleaser release --snapshot --clean
version: 2

project_name: actually

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  # .Version includes the build-metadata suffix used for cross-tool
  # uniqueness (e.g. "0.1.0+actually") — using Major/Minor/Patch instead
  # keeps the actual downloadable filenames clean.
  - name_template: "{{ .ProjectName }}_{{ .Major }}.{{ .Minor }}.{{ .Patch }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# Publishes a Homebrew formula to a separate tap repo, shared across all
# tools in this monorepo. Requires a HOMEBREW_TAP_GITHUB_TOKEN secret with
# write access to that repo — see docs/RELEASING.md.
brews:
  - repository:
      owner: Soldsoul86
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Soldsoul86/AAA/tree/main/actually"
    description: "Cross-checks what your AI agent claims it did against what actually happened."
    license: "MIT"
