name: release-ctxmeter

# This repo holds four independent tools. Each has its own release
# workflow, triggered only by its own tag prefix, so tagging one tool
# never triggers a release for the others.
on:
  push:
    tags:
      - "ctxmeter-v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ctxmeter
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Strip the "ctxmeter-" prefix into a local-only tag for goreleaser
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#ctxmeter-}"
          echo "$VERSION"
          # Local to this runner's checkout only — never pushed, so it can
          # never collide with another tool's version number in this repo.
          git tag "$VERSION" "$GITHUB_SHA"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: ctxmeter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}
