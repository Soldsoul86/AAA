name: Bug report
description: Something in one of these tools didn't work as documented
labels: ["bug"]
body:
  - type: dropdown
    id: tool
    attributes:
      label: Which tool
      options:
        - checkpoint
        - loopkill
        - ctxmeter
        - again
        - permit
        - actually
        - exists
        - spare
        - not sure / repo-level (README, release, install)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `<tool> --version`, or the install method if that flag doesn't apply
      placeholder: "e.g. spare v0.1.0, or \"installed via go install today\""
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell (if relevant)
      description: zsh, bash, PowerShell, cmd, etc. — matters a lot for checkpoint and spare specifically
      placeholder: "e.g. zsh 5.9, PowerShell 7.4"

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Paste the real terminal output if you can — exact error text matters more than a paraphrase
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands, in order, that trigger this
