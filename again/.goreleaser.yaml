# Release config for again, one of four tools in the Soldsoul86/AAA monorepo.
# This is a subfolder module — goreleaser is invoked from *inside*
# again/ by the root .github/workflows/release-again.yml workflow
# (working-directory: again), so all paths here are relative to this folder.
#
# Test locally before ever tagging a real release:
#   cd again && goreleaser release --snapshot --clean
version: 2

project_name: again

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  # .Version includes the build-metadata suffix used for cross-tool
  # uniqueness (e.g. "0.1.0+again") — using Major/Minor/Patch instead
  # keeps the actual downloadable filenames clean.
  - name_template: "{{ .ProjectName }}_{{ .Major }}.{{ .Minor }}.{{ .Patch }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# Publishes a Homebrew formula to a separate tap repo, shared across all
# four tools in this monorepo. Requires a HOMEBREW_TAP_GITHUB_TOKEN secret
# with write access to that repo — see docs/RELEASING.md.
brews:
  - repository:
      owner: Soldsoul86
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Soldsoul86/AAA/tree/main/again"
    description: "Counts how many times you've had to repeat yourself to your AI agent this session."
    license: "MIT"
